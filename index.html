 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AQI Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>AQI Prediction 🌍</h2>

    <input type="number" id="pm25" placeholder="PM2.5">
    <input type="number" id="pm10" placeholder="PM10">
    <input type="number" id="no2" placeholder="NO2">
    <input type="number" id="co" placeholder="CO">
    <input type="number" id="o3" placeholder="O3">
    <input type="number" id="so2" placeholder="SO2">
    <input type="number" id="temp" placeholder="Temperature">
    <input type="number" id="humidity" placeholder="Humidity">

    <br>
    <button onclick="predictAQI()">Predict AQI</button>

    <div id="result"></div>
</div>

<script>
function predictAQI() {

    const data = {
        pm25: document.getElementById("pm25").value,
        pm10: document.getElementById("pm10").value,
        no2: document.getElementById("no2").value,
        co: document.getElementById("co").value,
        o3: document.getElementById("o3").value,
        so2:document.getElementById("so2").value,
        temp:document.getElementById("temp").value,
        humidity:document.getElementById("humidity").value
    };

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {

        if(result.error){
            document.getElementById("result").innerText = result.error;
        } else {
            document.getElementById("result").innerText =
                "AQI: " + result.aqi + " (" + result.status + ")";
        }

    })
    .catch(error => {
        document.getElementById("result").innerText = "Server error!";
        console.error(error);
    });
}
</script>

</body>
</html>
